services:
  - type: web
    name: dvary-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn api.index:app"
    envVars:
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
